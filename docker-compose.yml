services:
  homelabhq:
    build: .
    container_name: homelabhq
    restart: unless-stopped
    depends_on:
      data-init:
        condition: service_completed_successfully
    # The image already selects the dedicated unprivileged `homelabhq` user.
    # The application only needs its named /data volume and an ephemeral /tmp.
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m
    ports:
      - "8770:8770"
      # Plain-HTTP companion that serves ONLY the Home-Screen icons. iOS fetches
      # the apple-touch-icon via a service that won't validate the default
      # self-signed cert, so an HTTPS-only icon fails to install (blank tile).
      # Active only while running with a self-signed cert; a trusted cert serves
      # icons over HTTPS and leaves this port idle. Set HLHQ_ICON_HTTP_PORT=0
      # (and drop this mapping) to disable.
      - "8771:8771"
    volumes:
      - hlhq-data:/data
      # Optional: drop a trusted cert here as nm.crt + nm.key (mkcert local CA,
      # Let's Encrypt, tailscale cert) to avoid the self-signed browser warning.
      # - ./certs:/certs:ro
    environment:
      - TZ=UTC
      # Serve HTTPS (required for web push + PWA install in the browser). With
      # no trusted cert mounted, a self-signed one is generated on first run.
      - HLHQ_TLS=auto
      # For a self-signed cert the browser can accept, list EVERY hostname/IP
      # you use to reach HomelabHQ (comma-separated) so they land in the cert
      # SAN — otherwise the browser rejects it even after you trust it:
      # - HLHQ_TLS_HOSTS=192.168.1.10,homelabhq.lan
    healthcheck:
      # Liveness only: readiness is available separately at /readyz.
      test: ["CMD", "python3", "-c", "import ssl,urllib.request,sys; ctx=ssl._create_unverified_context(); sys.exit(0 if urllib.request.urlopen('https://127.0.0.1:8770/healthz',context=ctx).status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3

  # Existing volumes from pre-Phase-8 images are root-owned. Initialise (or
  # repair) ownership once before the unprivileged application starts; this
  # helper can modify only the explicitly mounted data volume.
  data-init:
    build: .
    user: "0:0"
    restart: "no"
    read_only: true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
    volumes:
      - hlhq-data:/data
    entrypoint: ["/bin/sh", "-c", "chown -R 10001:10001 /data"]

volumes:
  hlhq-data:

services:
  netmanager:
    build: .
    container_name: netmanager
    restart: unless-stopped
    ports:
      - "8770:8770"
    volumes:
      - nm-data:/data
    environment:
      - TZ=UTC
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8770/healthz').status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  nm-data:

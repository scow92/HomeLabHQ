name: Verify

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: ["3.11", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip

      - name: Upgrade packaging tools
        run: |
          python -m pip install --upgrade \
            "pip>=25" \
            "setuptools>=83.0.0"

      - name: Install locked dependencies
        run: python -m pip install -r requirements.txt -c constraints.txt -e '.[test]'

      - name: Compile
        run: python -m compileall -q backend _verify tests

      - name: Lint
        run: python -m ruff check backend _verify tests

      - name: Test with coverage
        run: python -m pytest --cov=backend --cov-report=term-missing

      - name: Audit dependencies
        run: python -m pip_audit

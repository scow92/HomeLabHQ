name: Verify

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ matrix.python }}
          cache: pip

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        if: matrix.python == '3.13'
        with:
          node-version: 24
          cache: npm

      - name: Upgrade packaging tools
        run: |
          python -m pip install --upgrade \
            "pip>=25" \
            "setuptools>=83.0.0"

      - name: Install locked dependencies
        run: python -m pip install -r requirements.txt -c constraints.txt -e '.[test]'

      - name: Compile
        run: python -m compileall -q backend _verify tests

      - name: Lint
        run: python -m ruff check backend _verify tests

      - name: Static type checks
        run: python -m mypy

      - name: Test with coverage
        run: python -m pytest --cov=backend --cov-report=term-missing

      - name: Audit dependencies
        run: python -m pip_audit

      - name: Install browser test dependencies
        if: matrix.python == '3.13'
        run: npm ci

      - name: Install Chromium
        if: matrix.python == '3.13'
        run: npx playwright install --with-deps chromium

      - name: Browser critical paths
        if: matrix.python == '3.13'
        run: npm run test:e2e
